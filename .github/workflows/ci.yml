name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: repopulse
          POSTGRES_PASSWORD: repopulse
          POSTGRES_DB: repopulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repopulse -d repopulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://repopulse:repopulse@localhost:5432/repopulse_test?schema=public
      TEST_DATABASE_URL: postgresql://repopulse:repopulse@localhost:5432/repopulse_test
      NODE_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: PostgreSQL integration tests
        run: npm run test:integration

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
